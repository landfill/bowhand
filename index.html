<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>BowHand</title>
  <link rel="icon" href="data:,">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #app { width: 100%; height: 100%; position: relative; }
    #app canvas { position: absolute; inset: 0; z-index: 1; }
    /* Hidden video for MediaPipe input — must not use display:none */
    #pip-view {
      position: absolute; bottom: 0; right: 0; z-index: -1;
      width: 1px; height: 1px; opacity: 0.01;
      pointer-events: none;
    }
    #loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1a1a2e; color: #e0e0e0;
      font-family: system-ui, sans-serif; z-index: 100;
    }
    #loading h1 { font-size: 2rem; margin-bottom: 1rem; }
    #loading p { font-size: 1rem; opacity: 0.7; }
    #start-btn {
      margin-top: 1.5rem; padding: 1rem 2.5rem;
      font-size: 1.2rem; font-weight: bold;
      background: #e94560; color: #fff; border: none;
      border-radius: 12px; cursor: pointer;
      touch-action: manipulation;
    }
    #start-btn:active { background: #c73550; transform: scale(0.96); }
    .spinner {
      width: 40px; height: 40px; margin: 1rem;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-screen {
      position: absolute; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1a1a2e; color: #e0e0e0;
      font-family: system-ui, sans-serif; z-index: 100;
      padding: 2rem; text-align: center;
    }
    #error-screen h2 { margin-bottom: 1rem; }
    #error-screen p { opacity: 0.7; max-width: 300px; }
  </style>
</head>
<body>
  <div id="app">
    <video id="pip-view" playsinline autoplay muted></video>
    <div id="loading">
      <h1>BowHand</h1>
      <button id="start-btn">START</button>
      <p id="loading-text"></p>
    </div>
    <div id="error-screen">
      <h2 id="error-title">Error</h2>
      <p id="error-message"></p>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
