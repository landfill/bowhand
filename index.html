<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>BowHand</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #app { width: 100%; height: 100%; position: relative; }
    #ar-background {
      position: absolute; inset: 0; z-index: 0;
      object-fit: cover; width: 100%; height: 100%;
    }
    #pip-view {
      position: absolute; bottom: 16px; right: 16px; z-index: 20;
      width: 120px; height: 90px; border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.3);
      object-fit: cover; transform: scaleX(-1);
      background: #222; opacity: 0.85;
    }
    #app canvas { position: relative; z-index: 1; }
    #loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1a1a2e; color: #e0e0e0;
      font-family: system-ui, sans-serif; z-index: 100;
    }
    #loading h1 { font-size: 2rem; margin-bottom: 1rem; }
    #loading p { font-size: 1rem; opacity: 0.7; }
    .spinner {
      width: 40px; height: 40px; margin: 1rem;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-screen {
      position: absolute; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1a1a2e; color: #e0e0e0;
      font-family: system-ui, sans-serif; z-index: 100;
      padding: 2rem; text-align: center;
    }
    #error-screen h2 { margin-bottom: 1rem; }
    #error-screen p { opacity: 0.7; max-width: 300px; }
  </style>
</head>
<body>
  <div id="app">
    <video id="ar-background" playsinline autoplay muted></video>
    <video id="pip-view" playsinline autoplay muted></video>
    <div id="loading">
      <h1>BowHand</h1>
      <div class="spinner"></div>
      <p id="loading-text">Initializing...</p>
    </div>
    <div id="error-screen">
      <h2 id="error-title">Error</h2>
      <p id="error-message"></p>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
